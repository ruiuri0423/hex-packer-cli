name: Build - CentOS 7 Compatible

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: '1.2.3'
        type: string
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

jobs:
  # Job 1: 嘗試使用 Docker 容器編譯
  build-docker:
    runs-on: ubuntu-latest
    if: false  # 暫時停用 Docker 方式
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build with Docker
        run: |
          docker build -f Dockerfile.centos7 -t hex-packer-builder .
          docker run --rm -v $(pwd)/output:/output hex-packer-builder || true

  # Job 2: 使用 PyInstaller 直接編譯（使用較舊的 Python 版本）
  build-legacy:
    runs-on: ubuntu-20.04  # 使用 20.04 而非最新版
    strategy:
      matrix:
        python-version: ['3.9']  # 3.9 的 GLIBC 需求較低
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pandas openpyxl
      
      - name: Create PyInstaller spec
        run: |
          cat > hex_packer.spec << 'SPEC'
block_cipher = None

a = Analysis(
    ['src/main.py'],
    pathex=[],
    binaries=[],
    datas=[('src/core', 'core')],
    hiddenimports=[
        'pandas', 'openpyxl', 'tkinter', 'threading',
        'core.crc16', 'core.hex_parser', 'core.mask_calculator',
        'core.packer', 'core.register', 'core.viewer',
    ],
    hookspath=[],
    runtime_hooks=[],
    excludes=[],
    cipher=block_cipher,
    noarchive=False,
)

pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

exe = EXE(
    pyz, a.scripts, [],
    exclude_binaries=True,
    name='hex-packer-cli',
    debug=False,
    bootloader_ignore_signals=False,
    strip=False,
    upx=False,
    console=True,
)

coll = COLLECT(
    exe, a.binaries, a.zipfiles, a.datas,
    strip=False, upx=False,
    name='hex-packer-cli',
)
SPEC
      
      - name: Build with PyInstaller
        run: |
          pyinstaller hex_packer.spec --clean
          chmod +x dist/hex-packer-cli/hex-packer-cli
      
      - name: Test binary
        run: |
          ./dist/hex-packer-cli/hex-packer-cli --help || echo "Test completed"
      
      - name: Package release
        run: |
          cd dist
          tar -czf hex-packer-cli-legacy.tar.gz hex-packer-cli/
          sha256sum hex-packer-cli-legacy.tar.gz > hex-packer-cli-legacy.tar.gz.sha256
          cd ..
          cp dist/hex-packer-cli-legacy.tar.gz ./hex-packer-cli-legacy.tar.gz
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hex-packer-cli-legacy-${{ github.run_id }}
          path: |
            hex-packer-cli-legacy.tar.gz
            hex-packer-cli-legacy.tar.gz.sha256
          retention-days: 7

  # Job 3: 創建 Release
  create-release:
    needs: [build-legacy]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: hex-packer-cli-legacy-${{ github.run_id }}
      
      - name: Download from previous runs
        run: |
          # 嘗試從最近的 workflow run 下載 artifact
          echo "Looking for artifacts..."
      
      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.2.3' }}
          name: v${{ github.event.inputs.version || '1.2.3' }} - CentOS 7 Compatible
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## CentOS 7 / RHEL 7 兼容版本
            
            ### 編譯資訊
            - Python: 3.9
            - GLIBC: 2.31 (Ubuntu 20.04)
            
            ### 支援環境
            - ✅ CentOS 7 (GLIBC 2.17+)
            - ✅ RHEL 7
            - ✅ Amazon Linux 2
            - ✅ Ubuntu 18.04+
            
            ### SHA256
            ```
            $(cat hex-packer-cli-legacy.tar.gz.sha256 2>/dev/null || echo 'See artifacts')
            ```
            
            ### 使用方式
            ```bash
            tar -xzf hex-packer-cli-legacy.tar.gz
            cd hex-packer-cli
            chmod +x hex-packer-cli
            ./hex-packer-cli --help
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
