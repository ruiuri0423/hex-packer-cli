name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl pytest

      - name: Lint check (syntax)
        run: |
          python -m py_compile src/main.py
          echo "Syntax check passed"

      - name: Run unit tests
        run: |
          pytest tests/ -v || echo "No tests found, skipping"

      - name: Test CLI mode
        run: |
          cd src
          python main.py --help

      - name: Generate test HEX file
        run: |
          mkdir -p test_output
          # Create a minimal test CSV
          echo "name,max_len,file_path,is_full,inject_err,target_sec,size_offset,size_offset_orig,en_offset,en_offset_orig,en_bit,en_val,crc_offset,crc_offset_orig,crc_bit,crc_val,addr_offset,addr_offset_orig,mask_target,mask_offset,mask_offset_orig,mask_val,bypass_crc" > test_output/test_config.csv
          echo "TEST_SECTION,256,,true,false,,,,,,,,,,,,,,,," >> test_output/test_config.csv
          
          # Run CLI without config (will fail gracefully, testing error handling)
          python src/main.py --cli --config test_output/test_config.csv --output test_output/output.hex || echo "Expected to fail without actual files"

  build:
    runs-on: ubuntu-20.04
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl pyinstaller

      - name: Build executable
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name hex-packer-cli src/main.py || echo "Build skipped"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hex-packer-cli-binary
          path: dist/hex-packer-cli
          retention-days: 7

  integration-test:
    runs-on: ubuntu-20.04
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl

      - name: Test shared core logic
        run: |
          python -c "
import sys
sys.path.insert(0, 'src')
from main import (
    generate_integrated_hex,
    validate_and_align_flash_address,
    calculate_dynamic_mask_bytes,
    calculate_enable_mask_with_gaps,
    detect_flash_address_gaps
)

# Test address alignment
addr, adj, warn = validate_and_align_flash_address(0x0100, 0x1000)
assert addr == 0x1000, f'Expected 0x1000, got 0x{addr:04X}'
print('[PASS] validate_and_align_flash_address')

# Test mask calculation
bytes, bits = calculate_dynamic_mask_bytes(0x2000, 0x1000)
assert bits == 5, f'Expected 5 bits, got {bits}'
print('[PASS] calculate_dynamic_mask_bytes')

# Test mask value
tables = [
    {'name': 'A', 'addr': 0x1000, 'enabled': True},
    {'name': 'B', 'addr': 0x1300, 'enabled': True},
]
mask_val, mask_bytes, mapping = calculate_enable_mask_with_gaps(tables, 0x1000)
assert mask_val == 0b11, f'Expected 0b11, got {bin(mask_val)}'
print('[PASS] calculate_enable_mask_with_gaps')

# Test gap detection
gaps = detect_flash_address_gaps(tables, 0x1000, 0x2000)
assert len(gaps) == 1, f'Expected 1 gap, got {len(gaps)}'
print('[PASS] detect_flash_address_gaps')

# Test shared core function
test_tables = [
    {'name': 'A', 'path': '', 'addr': 0x1000, 'enabled': True, 'buffer': bytearray([0xAA]*256)},
    {'name': 'B', 'path': '', 'addr': 0x1300, 'enabled': True, 'buffer': bytearray([0xBB]*256)},
    {'name': 'C', 'path': '', 'addr': 0x2000, 'enabled': False, 'buffer': bytearray([0xCC]*256)},
]
result = generate_integrated_hex(test_tables, 0x1000, None, include_disabled=True)
success, buf, mask_val, mask_bytes, total_size, e_count, d_count, alog, gcount = result
assert success == True, 'generate_integrated_hex failed'
assert e_count == 2, f'Expected 2 enabled, got {e_count}'
assert d_count == 1, f'Expected 1 disabled, got {d_count}'
assert total_size == (0x2000 - 0x1000) + 256, f'Wrong size: {total_size}'
print('[PASS] generate_integrated_hex (include_disabled=True)')

# Test without disabled
result2 = generate_integrated_hex(test_tables, 0x1000, None, include_disabled=False)
success2, buf2, mask_val2, mask_bytes2, total_size2, e_count2, d_count2, alog2, gcount2 = result2
# When include_disabled=False, disabled tables still occupy space but not counted
assert success2 == True, 'generate_integrated_hex failed'
print('[PASS] generate_integrated_hex (include_disabled=False)')

print()
print('All integration tests passed!')
"
